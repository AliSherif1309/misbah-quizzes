<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Grade 10 Master Quiz | Grammar & Vocabulary (3 Sets)</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #e8eef4 0%, #dce3ec 100%);
            margin: 0;
            padding: 24px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
        }

        .card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25);
            padding: 28px 32px;
            transition: all 0.2s ease;
            border: 1px solid rgba(255,255,255,0.6);
        }

        #quiz-screen, #result-screen {
            display: none;
        }

        .logos-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 12px;
        }
        .logo {
            height: 58px;
            object-fit: contain;
        }

        /* MAIN TABS */
        .main-tabs {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 24px;
        }
        .main-tab-btn {
            flex: 1;
            border: none;
            padding: 14px 20px;
            border-radius: 60px;
            font-family: 'Inter', sans-serif;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            background: #f1f5f9;
            color: #475569;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .main-tab-btn.active {
            background: white;
            color: #1e40af;
            box-shadow: 0 8px 20px rgba(30,64,175,0.15);
        }
        .main-stats {
            background: #e2e8f0;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 700;
        }
        .main-tab-btn.active .main-stats {
            background: #dbeafe;
            color: #1e3a8a;
        }

        /* SECONDARY TABS (for Vocabulary sets) */
        .sub-tabs {
            display: flex;
            justify-content: center;
            gap: 12px;
            background: #f8fafc;
            padding: 8px;
            border-radius: 60px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }
        .sub-tab-btn {
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            cursor: pointer;
            background: transparent;
            color: #334155;
            font-size: 0.9rem;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .sub-tab-btn.active {
            background: white;
            color: #1e40af;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .sub-stats {
            background: #e2e8f0;
            padding: 2px 8px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .sub-tab-btn.active .sub-stats {
            background: #dbeafe;
            color: #1e3a8a;
        }

        .progress-wrapper {
            background: #f1f5f9;
            padding: 12px 20px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }
        .progress-container {
            flex: 1;
            background: #e2e8f0;
            height: 10px;
            border-radius: 20px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #2563eb, #7c3aed);
            width: 0%;
            transition: width 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border-radius: 20px;
        }
        .stats-text {
            font-weight: 700;
            background: white;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.85rem;
            color: #1e293b;
        }
        .stats-text span {
            color: #2563eb;
            font-size: 1.1rem;
            font-weight: 800;
        }

        .questions-grid {
            display: flex;
            flex-direction: column;
            gap: 24px;
            max-height: 56vh;
            overflow-y: auto;
            padding: 6px 4px 12px 4px;
            scroll-behavior: smooth;
        }
        .question-card {
            background: #ffffff;
            border-radius: 28px;
            padding: 20px 24px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }
        .question-text {
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 18px;
            line-height: 1.4;
            padding-left: 14px;
            border-left: 5px solid #3b82f6;
            color: #0f172a;
        }
        .options-area {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .option-btn {
            flex: 1 0 calc(50% - 12px);
            min-width: 170px;
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            padding: 10px 14px;
            border-radius: 40px;
            font-family: 'Inter', monospace;
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.12s;
            text-align: left;
            color: #1e293b;
        }
        .option-btn:hover:not(:disabled) {
            background: #eef2ff;
            border-color: #cbd5e1;
            transform: scale(0.97);
        }
        .correct {
            background: #dcfce7 !important;
            border-color: #22c55e !important;
            color: #14532d;
        }
        .wrong {
            background: #fee2e2 !important;
            border-color: #ef4444 !important;
            color: #991b1b;
            text-decoration: line-through;
        }
        .option-btn:disabled {
            cursor: default;
            opacity: 0.9;
        }

        .btn-main {
            background: linear-gradient(105deg, #2563eb, #4f46e5);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Inter', sans-serif;
            box-shadow: 0 6px 14px rgba(37,99,235,0.3);
        }
        .btn-main:hover {
            transform: translateY(-2px);
            filter: brightness(1.02);
        }
        .btn-secondary {
            background: #334155;
            box-shadow: none;
        }
        input {
            width: 85%;
            padding: 14px 20px;
            border-radius: 60px;
            border: 2px solid #e2e8f0;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            text-align: center;
            background: #fefefe;
            margin-bottom: 20px;
        }
        input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
        }
        .result-buttons {
            display: flex;
            justify-content: center;
            gap: 18px;
            margin-top: 28px;
            flex-wrap: wrap;
        }
        h1 {
            font-size: 1.9rem;
            font-weight: 800;
            background: linear-gradient(135deg, #1e293b, #2563eb);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.25rem;
        }
        .subhead {
            color: #475569;
            font-weight: 500;
            margin-bottom: 1.5rem;
        }
        footer {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 1rem;
            color: #64748b;
        }
        @media (max-width: 720px) {
            .card { padding: 20px; }
            .option-btn { flex: 1 0 100%; }
            .main-tabs { flex-direction: column; gap: 10px; }
            .sub-tabs { flex-direction: column; align-items: stretch; }
            .sub-tab-btn { justify-content: center; }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- WELCOME SCREEN -->
    <div id="welcome-screen" class="card">
        <div class="logos-container">
            <img src="neu-logo.png" class="logo" id="logo-neu" alt="logo" onerror="this.style.display='none'">
            <img src="lights-logo.png" class="logo" id="logo-lights" alt="logo" onerror="this.style.display='none'">
        </div>
        <h1>📘 Grade 10 High Achiever Quiz</h1>
        <div class="subhead">Unit 12: Grammar & Vocabulary (3 Sets)</div>
        <p style="margin-bottom: 16px;">Teacher: Mr. Ali Misbah</p>
        <input type="text" id="student-name" placeholder="Enter your full name" autocomplete="off">
        <br>
        <button class="btn-main" onclick="initiateQuiz()">✨ Start Quiz ✨</button>
        <footer>28 questions (Grammar + 3 Vocabulary Sets) | certificate included</footer>
    </div>

    <!-- QUIZ SCREEN (main + sub tabs) -->
    <div id="quiz-screen" class="card">
        <div class="logos-container" style="margin-bottom: 8px;">
            <div style="font-weight:800; background:#eef2ff; padding:5px 15px; border-radius:40px;">🎓 Grade 10 Challenge</div>
            <div style="font-size:0.8rem;">🎯 Mr. Ali Misbah</div>
        </div>

        <!-- Main Tabs -->
        <div class="main-tabs">
            <button class="main-tab-btn active" data-main="grammar" onclick="switchMainTab('grammar')">
                📖 Grammar
                <span class="main-stats" id="grammar-main-stats">0/9 ✅ 0</span>
            </button>
            <button class="main-tab-btn" data-main="vocab" onclick="switchMainTab('vocab')">
                📚 Vocabulary
                <span class="main-stats" id="vocab-main-stats">0/19 ✅ 0</span>
            </button>
        </div>

        <!-- Secondary tabs (only visible for Vocabulary) -->
        <div id="sub-tabs-container" class="sub-tabs" style="display: none;"></div>

        <div class="progress-wrapper">
            <div class="progress-container">
                <div class="progress-bar" id="global-progress"></div>
            </div>
            <div class="stats-text">🏆 Total Score: <span id="total-score-span">0</span> / <span id="total-questions-count">28</span></div>
        </div>

        <div id="questions-container" class="questions-grid"></div>
    </div>

    <!-- RESULT SCREEN -->
    <div id="result-screen" class="card">
        <div style="font-size: 70px; text-align:center;">🏅</div>
        <h1 id="rank-slot" style="text-align:center;">Master Achiever</h1>
        <h2 id="final-score" style="text-align:center; margin: 10px 0;"></h2>
        <div class="result-buttons">
            <button class="btn-main" onclick="downloadCertificate()" style="background:#0f172a;">📜 Download Certificate</button>
            <button class="btn-main btn-secondary" onclick="resetFullQuiz()">🔄 Try Again</button>
        </div>
    </div>
</div>

<audio id="snd-correct" preload="auto" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>
<audio id="snd-wrong" preload="auto" src="https://assets.mixkit.co/active_storage/sfx/2003/2003-preview.mp3"></audio>
<audio id="snd-win" preload="auto" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>

<script>
    const { jsPDF } = window.jspdf;
    
    // ======================= GRADE 10 QUESTIONS =======================
    // GRAMMAR (9 questions from previous)
    const GRAMMAR_QS = [
        { id: 0, text: "1. If he ................ slowly, the accident wouldn't have happened.", options: ["Drives", "drove", "had driven", "will drive"], correct: 2, main: "grammar", sub: null },
        { id: 1, text: "2. We ................ by taxi if we had found the right bus.", options: ["came", "won't come", "wouldn't have come", "would come"], correct: 2, main: "grammar", sub: null },
        { id: 2, text: "3. The man ................ sent you this letter is my cousin.", options: ["who", "whose", "where", "which"], correct: 0, main: "grammar", sub: null },
        { id: 3, text: "4. This is the house ................ Omar lives.", options: ["whose", "where", "who", "which"], correct: 1, main: "grammar", sub: null },
        { id: 4, text: "5. The man ................ the car hit him yesterday, was hospitalised immediately.", options: ["whose", "which", "whom", "when"], correct: 2, main: "grammar", sub: null },
        { id: 5, text: "6. If she ................ the map, she wouldn't have gotten lost.", options: ["uses", "used", "had used", "will use"], correct: 2, main: "grammar", sub: null },
        { id: 6, text: "7. They ................ the match if the referee hadn't made that mistake.", options: ["win", "won", "would have won", "would win"], correct: 2, main: "grammar", sub: null },
        { id: 7, text: "8. I met the famous writer ................ stories are well-known worldwide.", options: ["who", "whom", "where", "whose"], correct: 3, main: "grammar", sub: null },
        { id: 8, text: "9. If I had to borrow some money, I ................ my elder brother.", options: ["will ask", "would have asked", "would ask", "am asking"], correct: 2, main: "grammar", sub: null }
    ];
    
    // VOCABULARY: Set 1 (first 8 questions from original vocab list)
    const VOCAB_SET1 = [
        { id: 9, text: "1. Modern ................ has made the world smaller by bringing people and cultures closer.", options: ["aviation", "gliding", "instructors", "ring"], correct: 0, main: "vocab", sub: "set1" },
        { id: 10, text: "2. ................ is an exciting sport that lets you fly without an engine.", options: ["aviation", "instructor", "ring", "gliding"], correct: 3, main: "vocab", sub: "set1" },
        { id: 11, text: "3. My sister focused ................ on her studies to prepare for the exam.", options: ["Exemplary", "intensely", "briefly", "crazily"], correct: 1, main: "vocab", sub: "set1" },
        { id: 12, text: "4. Schools reward students who show ................ behaviour during the school year.", options: ["exemplary", "portable", "urgent", "impromptu"], correct: 0, main: "vocab", sub: "set1" },
        { id: 13, text: "5. Children should be taught to behave ................ and kindly towards other people.", options: ["courteously", "notably", "intensely", "briefly"], correct: 0, main: "vocab", sub: "set1" },
        { id: 14, text: "6. The teacher spoke in a ................ voice to stop the noise.", options: ["stunned", "stern", "exemplary", "confrontational"], correct: 1, main: "vocab", sub: "set1" },
        { id: 15, text: "7. My friend closely ................ her mother in both looks and personality.", options: ["coincides with", "unlocks", "mumbles", "resembles"], correct: 3, main: "vocab", sub: "set1" },
        { id: 16, text: "8. The seats of the plane were comfortable, and the flight ................ were friendly and helpful.", options: ["attendants", "expressions", "instructors", "cabins"], correct: 0, main: "vocab", sub: "set1" }
    ];
    
    // VOCABULARY: Set 2 (next 6 questions)
    const VOCAB_SET2 = [
        { id: 17, text: "1. The plane usually flies at an ................ of more than 16 thousand feet.", options: ["radar", "headline", "altitude", "fog"], correct: 2, main: "vocab", sub: "set2" },
        { id: 18, text: "2. My family ordered a/an ................ table for the dining room.", options: ["custom-built", "voice-activated", "stern", "stunned"], correct: 0, main: "vocab", sub: "set2" },
        { id: 19, text: "3. Learning how to ................ is an important aspect of pilot training.", options: ["mumble", "endeavour", "aviate", "resemble"], correct: 2, main: "vocab", sub: "set2" },
        { id: 20, text: "4. The ................ of the news grabbed my attention with an interesting story.", options: ["velocity", "control", "eyewitness", "headline"], correct: 3, main: "vocab", sub: "set2" },
        { id: 21, text: "5. You should ................ an expert before starting your own business.", options: ["smuggle", "consult", "recharge", "slide"], correct: 1, main: "vocab", sub: "set2" },
        { id: 22, text: "6. All the passengers cheered loudly when the plane ................", options: ["set off", "touched down", "knocked off", "dropped off"], correct: 1, main: "vocab", sub: "set2" }
    ];
    
    // VOCABULARY: Set 3 (last 5 questions)
    const VOCAB_SET3 = [
        { id: 23, text: "1. The club celebrated its 21st ................ with a special event for its fans and players.", options: ["frequency", "current", "anniversary", "congestion"], correct: 2, main: "vocab", sub: "set3" },
        { id: 24, text: "2. Safety measures should be taken in the science lab to avoid ................ situations.", options: ["acclaimed", "affluent", "portable", "hazardous"], correct: 3, main: "vocab", sub: "set3" },
        { id: 25, text: "3. It is a smart move towards a better future to ................ in renewable energy companies.", options: ["slide", "invest", "mumble", "draw"], correct: 1, main: "vocab", sub: "set3" },
        { id: 26, text: "4. Unluckily, a boy was ................ his bike by a careless driver as he was crossing the road.", options: ["knocked off", "turned up", "set off", "ended up with"], correct: 0, main: "vocab", sub: "set3" },
        { id: 27, text: "5. The flight ................ provided excellent service to the passengers throughout the journey.", options: ["auction", "breakdown", "hassle", "attendant"], correct: 3, main: "vocab", sub: "set3" }
    ];
    
    const ALL_QUESTIONS = [...GRAMMAR_QS, ...VOCAB_SET1, ...VOCAB_SET2, ...VOCAB_SET3];
    const TOTAL_QS = ALL_QUESTIONS.length;
    
    let studentName = "";
    let userAnswers = new Array(TOTAL_QS).fill(null);
    let currentMain = "grammar";      // 'grammar' or 'vocab'
    let currentSub = null;             // for vocab: 'set1', 'set2', 'set3'
    
    // DOM elements
    const welcomeScreen = document.getElementById('welcome-screen');
    const quizScreen = document.getElementById('quiz-screen');
    const resultScreen = document.getElementById('result-screen');
    const questionsContainer = document.getElementById('questions-container');
    const globalProgress = document.getElementById('global-progress');
    const totalScoreSpan = document.getElementById('total-score-span');
    const totalQtySpan = document.getElementById('total-questions-count');
    const subTabsContainer = document.getElementById('sub-tabs-container');
    
    // Helper: compute stats per main and per sub
    function computeStats() {
        let grammarDone = 0, grammarCorrect = 0;
        let vocabDone = 0, vocabCorrect = 0;
        let overallCorrect = 0, overallDone = 0;
        let subStats = { set1: { done: 0, correct: 0, total: 8 }, set2: { done: 0, correct: 0, total: 6 }, set3: { done: 0, correct: 0, total: 5 } };
        
        ALL_QUESTIONS.forEach(q => {
            const ans = userAnswers[q.id];
            const isAnswered = ans !== null;
            if (isAnswered) {
                overallDone++;
                const isRight = (ans === q.correct);
                if (isRight) overallCorrect++;
                
                if (q.main === "grammar") {
                    grammarDone++;
                    if (isRight) grammarCorrect++;
                } else {
                    vocabDone++;
                    if (isRight) vocabCorrect++;
                    if (q.sub === "set1") {
                        subStats.set1.done++;
                        if (isRight) subStats.set1.correct++;
                    } else if (q.sub === "set2") {
                        subStats.set2.done++;
                        if (isRight) subStats.set2.correct++;
                    } else if (q.sub === "set3") {
                        subStats.set3.done++;
                        if (isRight) subStats.set3.correct++;
                    }
                }
            }
        });
        return { grammarDone, grammarCorrect, vocabDone, vocabCorrect, overallCorrect, overallDone, subStats };
    }
    
    function updateUIStats() {
        const stats = computeStats();
        document.getElementById('grammar-main-stats').innerHTML = `${stats.grammarDone}/9 ✅ ${stats.grammarCorrect}`;
        document.getElementById('vocab-main-stats').innerHTML = `${stats.vocabDone}/19 ✅ ${stats.vocabCorrect}`;
        totalScoreSpan.innerText = stats.overallCorrect;
        const percent = (stats.overallDone / TOTAL_QS) * 100;
        globalProgress.style.width = percent + "%";
        
        // update sub-tab badges if they exist
        const set1btn = document.getElementById('sub-set1');
        if (set1btn) set1btn.querySelector('.sub-stats').innerHTML = `${stats.subStats.set1.done}/8 ✅ ${stats.subStats.set1.correct}`;
        const set2btn = document.getElementById('sub-set2');
        if (set2btn) set2btn.querySelector('.sub-stats').innerHTML = `${stats.subStats.set2.done}/6 ✅ ${stats.subStats.set2.correct}`;
        const set3btn = document.getElementById('sub-set3');
        if (set3btn) set3btn.querySelector('.sub-stats').innerHTML = `${stats.subStats.set3.done}/5 ✅ ${stats.subStats.set3.correct}`;
        return stats;
    }
    
    // Build sub-tabs for Vocabulary (3 sets)
    function rebuildSubTabs() {
        if (currentMain === 'grammar') {
            subTabsContainer.style.display = 'none';
            currentSub = null;
        } else {
            subTabsContainer.style.display = 'flex';
            subTabsContainer.innerHTML = `
                <button id="sub-set1" class="sub-tab-btn ${currentSub === 'set1' ? 'active' : ''}" onclick="switchSubTab('set1')">
                    📘 Lessons 1&2 (8) <span class="sub-stats">0/8 ✅ 0</span>
                </button>
                <button id="sub-set2" class="sub-tab-btn ${currentSub === 'set2' ? 'active' : ''}" onclick="switchSubTab('set2')">
                    📗 Lessons 4&5 (6) <span class="sub-stats">0/6 ✅ 0</span>
                </button>
                <button id="sub-set3" class="sub-tab-btn ${currentSub === 'set3' ? 'active' : ''}" onclick="switchSubTab('set3')">
                    📙 Lessons 7&8 <span class="sub-stats">0/5 ✅ 0</span>
                </button>
            `;
            if (!currentSub) currentSub = 'set1';
            document.querySelectorAll('.sub-tab-btn').forEach(btn => {
                if (btn.id === `sub-${currentSub}`) btn.classList.add('active');
                else btn.classList.remove('active');
            });
        }
        updateUIStats();
    }
    
    function getCurrentQuestions() {
        if (currentMain === 'grammar') {
            return ALL_QUESTIONS.filter(q => q.main === 'grammar');
        } else {
            return ALL_QUESTIONS.filter(q => q.main === 'vocab' && q.sub === currentSub);
        }
    }
    
    function renderCurrentTab() {
        if (!questionsContainer) return;
        const filtered = getCurrentQuestions();
        questionsContainer.innerHTML = "";
        
        filtered.forEach((q, idx) => {
            const card = document.createElement('div');
            card.className = 'question-card';
            const qText = document.createElement('div');
            qText.className = 'question-text';
            let displayNum = idx + 1;
            qText.innerText = `${displayNum}. ${q.text}`;
            card.appendChild(qText);
            
            const optsDiv = document.createElement('div');
            optsDiv.className = 'options-area';
            q.options.forEach((opt, optIdx) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = `${String.fromCharCode(65+optIdx)}. ${opt}`;
                const isAnswered = userAnswers[q.id] !== null;
                if (isAnswered) {
                    btn.disabled = true;
                    if (optIdx === q.correct) btn.classList.add('correct');
                    if (optIdx === userAnswers[q.id] && optIdx !== q.correct) btn.classList.add('wrong');
                } else {
                    btn.onclick = () => handleAnswer(q.id, optIdx);
                }
                optsDiv.appendChild(btn);
            });
            card.appendChild(optsDiv);
            questionsContainer.appendChild(card);
        });
    }
    
    function handleAnswer(qId, selectedIdx) {
        if (userAnswers[qId] !== null) return;
        const question = ALL_QUESTIONS.find(q => q.id === qId);
        const isCorrect = (selectedIdx === question.correct);
        const sound = document.getElementById(isCorrect ? 'snd-correct' : 'snd-wrong');
        if (sound) sound.play().catch(e=>{});
        userAnswers[qId] = selectedIdx;
        renderCurrentTab();
        const stats = updateUIStats();
        if (stats.overallDone === TOTAL_QS) {
            setTimeout(() => showResultsScreen(), 500);
        }
    }
    
    function switchMainTab(main) {
        currentMain = main;
        if (main === 'grammar') {
            currentSub = null;
        } else {
            if (!currentSub) currentSub = 'set1';
        }
        document.querySelectorAll('.main-tab-btn').forEach(btn => {
            if (btn.getAttribute('data-main') === main) btn.classList.add('active');
            else btn.classList.remove('active');
        });
        rebuildSubTabs();
        renderCurrentTab();
    }
    
    function switchSubTab(sub) {
        currentSub = sub;
        rebuildSubTabs();
        renderCurrentTab();
    }
    
    function initiateQuiz() {
        const nameInput = document.getElementById('student-name');
        const raw = nameInput.value.trim();
        if (raw === "") {
            alert("Please enter your name to begin.");
            return;
        }
        studentName = raw;
        userAnswers = new Array(TOTAL_QS).fill(null);
        currentMain = "grammar";
        currentSub = null;
        document.querySelectorAll('.main-tab-btn').forEach(btn => {
            if (btn.getAttribute('data-main') === 'grammar') btn.classList.add('active');
            else btn.classList.remove('active');
        });
        rebuildSubTabs();
        updateUIStats();
        renderCurrentTab();
        welcomeScreen.style.display = 'none';
        quizScreen.style.display = 'block';
        resultScreen.style.display = 'none';
        if (questionsContainer) questionsContainer.scrollTop = 0;
    }
    
    function showResultsScreen() {
        const stats = computeStats();
        const percent = Math.round((stats.overallCorrect / TOTAL_QS) * 100);
        let rank = "";
        if (stats.overallCorrect === TOTAL_QS) rank = "🏆 PERFECT SCHOLAR 🏆";
        else if (stats.overallCorrect >= 23) rank = "🌟 Excellence Award 🌟";
        else if (stats.overallCorrect >= 18) rank = "📚 Proficient Achiever";
        else rank = "📖 Keep Growing!";
        document.getElementById('rank-slot').innerHTML = rank;
        document.getElementById('final-score').innerHTML = `🎯 Score: ${stats.overallCorrect} / ${TOTAL_QS}  (${percent}%)`;
        quizScreen.style.display = 'none';
        resultScreen.style.display = 'block';
        const win = document.getElementById('snd-win');
        if (win) win.play().catch(e=>{});
        canvasConfetti({ particleCount: 220, spread: 85, origin: { y: 0.6 }, colors: ['#2563eb', '#4f46e5', '#f59e0b'] });
        canvasConfetti({ particleCount: 70, spread: 120, origin: { y: 0.4, x: 0.3 }, startVelocity: 15 });
    }
    
    function resetFullQuiz() {
        studentName = "";
        userAnswers = new Array(TOTAL_QS).fill(null);
        document.getElementById('student-name').value = "";
        welcomeScreen.style.display = 'block';
        quizScreen.style.display = 'none';
        resultScreen.style.display = 'none';
        currentMain = "grammar";
        currentSub = null;
        updateUIStats();
        globalProgress.style.width = "0%";
        document.querySelectorAll('.main-tab-btn').forEach(btn => {
            if (btn.getAttribute('data-main') === 'grammar') btn.classList.add('active');
            else btn.classList.remove('active');
        });
    }
    
    function downloadCertificate() {
        if (!studentName) {
            const fallback = document.getElementById('student-name')?.value.trim();
            if (fallback) studentName = fallback;
            else studentName = "Ambitious Student";
        }
        const stats = computeStats();
        const percent = Math.round((stats.overallCorrect / TOTAL_QS) * 100);
        const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
        const w = 297, h = 210;
        doc.setFillColor(240, 248, 255);
        doc.rect(0, 0, w, h, 'F');
        doc.setDrawColor(37, 99, 235);
        doc.setLineWidth(2);
        doc.rect(10, 10, w - 20, h - 20);
        
        doc.setFont("helvetica", "bold");
        doc.setFontSize(32);
        doc.setTextColor(30, 41, 59);
        doc.text("CERTIFICATE OF ACHIEVEMENT", w/2, 55, { align: "center" });
        
        doc.setFont("helvetica", "normal");
        doc.setFontSize(18);
        doc.setTextColor(71, 85, 105);
        doc.text("This certificate is proudly presented to", w/2, 80, { align: "center" });
        
        doc.setFont("helvetica", "bold");
        doc.setFontSize(34);
        doc.setTextColor(37, 99, 235);
        doc.text(studentName.toUpperCase(), w/2, 110, { align: "center" });
        
        doc.setFont("helvetica", "normal");
        doc.setFontSize(16);
        doc.setTextColor(51, 65, 85);
        doc.text(`for outstanding performance in Grade 10 English (Unit 12)`, w/2, 138, { align: "center" });
        doc.text(`Grammar & Vocabulary Mastery (3 Sets)`, w/2, 152, { align: "center" });
        
        doc.setFontSize(20);
        doc.setFont("helvetica", "bold");
        doc.setTextColor(22, 163, 74);
        doc.text(`Final Score: ${stats.overallCorrect} / ${TOTAL_QS}  ·  ${percent}%`, w/2, 172, { align: "center" });
        
        doc.setFontSize(12);
        doc.setFont("helvetica", "italic");
        doc.setTextColor(100, 116, 139);
        doc.text(`Date: ${new Date().toLocaleDateString()}`, w/2, 190, { align: "center" });
        
        doc.setFont("helvetica", "bold");
        doc.setFontSize(14);
        doc.setTextColor(15, 23, 42);
        doc.text("Mr. Ali Misbah", w/2, 202, { align: "center" });
        doc.setFontSize(10);
        doc.text("English Language Instructor", w/2, 208, { align: "center" });
        
        doc.save(`${studentName.replace(/\s/g, "_")}_Grade10_Certificate.pdf`);
    }
    
    totalQtySpan.innerText = TOTAL_QS;
    window.initiateQuiz = initiateQuiz;
    window.switchMainTab = switchMainTab;
    window.switchSubTab = switchSubTab;
    window.resetFullQuiz = resetFullQuiz;
    window.downloadCertificate = downloadCertificate;
    
    document.addEventListener('DOMContentLoaded', () => {
        updateUIStats();
    });
</script>
</body>
</html>
