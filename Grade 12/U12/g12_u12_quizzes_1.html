<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Grade 12 Master Quiz | Grammar & Vocabulary</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #f0f4fa 0%, #e3e9f2 100%);
            margin: 0;
            padding: 24px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
        }

        .card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25);
            padding: 28px 32px;
            transition: all 0.2s ease;
            border: 1px solid rgba(255,255,255,0.6);
        }

        #quiz-screen, #result-screen {
            display: none;
        }

        .logos-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 12px;
        }
        .logo {
            height: 58px;
            object-fit: contain;
        }

        /* MAIN TABS (Grammar / Vocabulary) */
        .main-tabs {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 24px;
        }
        .main-tab-btn {
            flex: 1;
            border: none;
            padding: 14px 20px;
            border-radius: 60px;
            font-family: 'Inter', sans-serif;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            background: #f1f5f9;
            color: #475569;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .main-tab-btn.active {
            background: white;
            color: #0f3b5c;
            box-shadow: 0 8px 20px rgba(15,59,92,0.15);
        }
        .main-stats {
            background: #e2e8f0;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 700;
        }
        .main-tab-btn.active .main-stats {
            background: #d9e6f2;
            color: #0a2f4a;
        }

        /* SECONDARY TABS (for Vocabulary sub-sections) */
        .sub-tabs {
            display: flex;
            justify-content: center;
            gap: 12px;
            background: #f8fafc;
            padding: 8px;
            border-radius: 60px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }
        .sub-tab-btn {
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            cursor: pointer;
            background: transparent;
            color: #334155;
            font-size: 0.9rem;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .sub-tab-btn.active {
            background: white;
            color: #0f3b5c;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .sub-stats {
            background: #e2e8f0;
            padding: 2px 8px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .sub-tab-btn.active .sub-stats {
            background: #d9e6f2;
            color: #0f3b5c;
        }

        .progress-wrapper {
            background: #f1f5f9;
            padding: 12px 20px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }
        .progress-container {
            flex: 1;
            background: #e2e8f0;
            height: 10px;
            border-radius: 20px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #2563eb, #7c3aed);
            width: 0%;
            transition: width 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border-radius: 20px;
        }
        .stats-text {
            font-weight: 700;
            background: white;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.85rem;
            color: #1e293b;
        }
        .stats-text span {
            color: #2563eb;
            font-size: 1.1rem;
            font-weight: 800;
        }

        .questions-grid {
            display: flex;
            flex-direction: column;
            gap: 24px;
            max-height: 56vh;
            overflow-y: auto;
            padding: 6px 4px 12px 4px;
            scroll-behavior: smooth;
        }
        .question-card {
            background: #ffffff;
            border-radius: 28px;
            padding: 20px 24px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }
        .question-text {
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 18px;
            line-height: 1.4;
            padding-left: 14px;
            border-left: 5px solid #3b82f6;
            color: #0f172a;
        }
        .options-area {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .option-btn {
            flex: 1 0 calc(50% - 12px);
            min-width: 170px;
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            padding: 10px 14px;
            border-radius: 40px;
            font-family: 'Inter', monospace;
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.12s;
            text-align: left;
            color: #1e293b;
        }
        .option-btn:hover:not(:disabled) {
            background: #eef2ff;
            border-color: #cbd5e1;
            transform: scale(0.97);
        }
        .correct {
            background: #dcfce7 !important;
            border-color: #22c55e !important;
            color: #14532d;
        }
        .wrong {
            background: #fee2e2 !important;
            border-color: #ef4444 !important;
            color: #991b1b;
            text-decoration: line-through;
        }
        .option-btn:disabled {
            cursor: default;
            opacity: 0.9;
        }

        .btn-main {
            background: linear-gradient(105deg, #1e4a6e, #0f3b5c);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Inter', sans-serif;
            box-shadow: 0 6px 14px rgba(15,59,92,0.3);
        }
        .btn-main:hover {
            transform: translateY(-2px);
            filter: brightness(1.02);
        }
        .btn-secondary {
            background: #334155;
            box-shadow: none;
        }
        input {
            width: 85%;
            padding: 14px 20px;
            border-radius: 60px;
            border: 2px solid #e2e8f0;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            text-align: center;
            background: #fefefe;
            margin-bottom: 20px;
        }
        input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
        }
        .result-buttons {
            display: flex;
            justify-content: center;
            gap: 18px;
            margin-top: 28px;
            flex-wrap: wrap;
        }
        h1 {
            font-size: 1.9rem;
            font-weight: 800;
            background: linear-gradient(135deg, #1e293b, #0f3b5c);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.25rem;
        }
        .subhead {
            color: #475569;
            font-weight: 500;
            margin-bottom: 1.5rem;
        }
        footer {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 1rem;
            color: #64748b;
        }
        @media (max-width: 720px) {
            .card { padding: 20px; }
            .option-btn { flex: 1 0 100%; }
            .main-tabs { flex-direction: column; gap: 10px; }
            .sub-tabs { flex-direction: column; align-items: stretch; }
            .sub-tab-btn { justify-content: center; }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- WELCOME SCREEN -->
    <div id="welcome-screen" class="card">
        <div class="logos-container">
            <img src="neu-logo.png" class="logo" id="logo-neu" alt="logo" onerror="this.style.display='none'">
            <img src="lights-logo.png" class="logo" id="logo-lights" alt="logo" onerror="this.style.display='none'">
        </div>
        <h1>📘 Grade 12 Unit 12 Quiz</h1>
        <div class="subhead">Grammar & Vocabulary Mastery | Lessons 1–8</div>
        <p style="margin-bottom: 16px;">Teacher: Mr. Ali Misbah</p>
        <input type="text" id="student-name" placeholder="Enter your full name" autocomplete="off">
        <br>
        <button class="btn-main" onclick="initiateQuiz()">✨ Start Quiz ✨</button>
        <footer>20 questions across Grammar + Vocabulary sections | certificate included</footer>
    </div>

    <!-- QUIZ SCREEN (main + sub tabs) -->
    <div id="quiz-screen" class="card">
        <div class="logos-container" style="margin-bottom: 8px;">
            <div style="font-weight:800; background:#eef2ff; padding:5px 15px; border-radius:40px;">🎓 Grade 12 Challenge</div>
            <div style="font-size:0.8rem;">🎯 Mr. Ali Misbah</div>
        </div>

        <!-- Main Tabs -->
        <div class="main-tabs">
            <button class="main-tab-btn active" data-main="grammar" onclick="switchMainTab('grammar')">
                📖 Grammar
                <span class="main-stats" id="grammar-main-stats">0/8 ✅ 0</span>
            </button>
            <button class="main-tab-btn" data-main="vocab" onclick="switchMainTab('vocab')">
                📚 Vocabulary
                <span class="main-stats" id="vocab-main-stats">0/12 ✅ 0</span>
            </button>
        </div>

        <!-- Secondary tabs (only visible for Vocabulary) -->
        <div id="sub-tabs-container" class="sub-tabs" style="display: none;"></div>

        <div class="progress-wrapper">
            <div class="progress-container">
                <div class="progress-bar" id="global-progress"></div>
            </div>
            <div class="stats-text">🏆 Total Score: <span id="total-score-span">0</span> / <span id="total-questions-count">20</span></div>
        </div>

        <div id="questions-container" class="questions-grid"></div>
    </div>

    <!-- RESULT SCREEN -->
    <div id="result-screen" class="card">
        <div style="font-size: 70px; text-align:center;">🏅</div>
        <h1 id="rank-slot" style="text-align:center;">Grammar & Vocabulary Star</h1>
        <h2 id="final-score" style="text-align:center; margin: 10px 0;"></h2>
        <div class="result-buttons">
            <button class="btn-main" onclick="downloadCertificate()" style="background:#0f172a;">📜 Download Certificate</button>
            <button class="btn-main btn-secondary" onclick="resetFullQuiz()">🔄 Try Again</button>
        </div>
    </div>
</div>

<audio id="snd-correct" preload="auto" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>
<audio id="snd-wrong" preload="auto" src="https://assets.mixkit.co/active_storage/sfx/2003/2003-preview.mp3"></audio>
<audio id="snd-win" preload="auto" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>

<script>
    const { jsPDF } = window.jspdf;
    
    // ======================= GRADE 12 QUESTIONS =======================
    // GRAMMAR (8 unique questions, cleaned duplicates)
    const GRAMMAR_QS = [
        { id: 0, text: "1. People ………… in rural areas enjoy the beautiful scenes and relaxing atmosphere.", options: ["live", "living", "lived", "lives"], correct: 1, main: "grammar", sub: null },
        { id: 1, text: "2. Oil is as precious …………………… gold.", options: ["as", "so", "such", "that"], correct: 0, main: "grammar", sub: null },
        { id: 2, text: "3. Some children show their talents …………………… a very early age.", options: ["with", "by", "for", "at"], correct: 3, main: "grammar", sub: null },
        { id: 3, text: "4. He is sitting …………………… the front row waiting for the lecturer to come in.", options: ["in", "at", "with", "from"], correct: 0, main: "grammar", sub: null },
        { id: 4, text: "5. The outcast had to move to another village, …………………… as a shepherd.", options: ["works", "worked", "working", "has worked"], correct: 2, main: "grammar", sub: null },
        { id: 5, text: "6. The man …………………… the car hit him yesterday, was hospitalised immediately.", options: ["whose", "which", "whom", "when"], correct: 2, main: "grammar", sub: null },
        { id: 6, text: "7. I met the famous writer …………………… stories are well-known worldwide.", options: ["who", "whom", "where", "whose"], correct: 3, main: "grammar", sub: null },
        { id: 7, text: "8. The son isn’t …………………… his late father.", options: ["as generous than", "as more generous", "so generous as", "as generous like"], correct: 2, main: "grammar", sub: null }
    ];
    
    // Vocabulary: Lessons 1&2 (4 questions)
    const VOCAB_L12 = [
        { id: 8, text: "1. Some examples are ……………… selected from different studies to support medical research.", options: ["arbitrarily", "vice versa", "roughly", "frequently"], correct: 0, main: "vocab", sub: "l12" },
        { id: 9, text: "2. Emily is planning to ……………… around the world in her coming vacation.", options: ["revere", "tour", "orbit", "alert"], correct: 1, main: "vocab", sub: "l12" },
        { id: 10, text: "3. My sister’s remarkable ……………… for music has been obvious since she was a child.", options: ["digit", "audience", "talent", "jockey"], correct: 2, main: "vocab", sub: "l12" },
        { id: 11, text: "4. The ……………… left the theatre early because the actors weren't well prepared.", options: ["digit", "prodigy", "talent", "audience"], correct: 3, main: "vocab", sub: "l12" }
    ];
    
    // Vocabulary: Lessons 4&5 (4 questions)
    const VOCAB_L45 = [
        { id: 12, text: "1. It is so exciting to see the young ……………… ride their horses at high speed in the race.", options: ["accusation", "jockey", "season", "high living"], correct: 1, main: "vocab", sub: "l45" },
        { id: 13, text: "2. The driver ……………… all claims of irresponsibility to escape punishment.", options: ["agonized", "toured", "repudiated", "orbited"], correct: 2, main: "vocab", sub: "l45" },
        { id: 14, text: "3. We should not make a/an ……………… until we have some proof.", options: ["jockey", "season", "high living", "accusation"], correct: 3, main: "vocab", sub: "l45" },
        { id: 15, text: "4. She ……………… over her exam results all night.", options: ["agonised", "repudiated", "toured", "orbited"], correct: 0, main: "vocab", sub: "l45" }
    ];
    
    // Vocabulary: Lessons 7&8 (4 questions)
    const VOCAB_L78 = [
        { id: 16, text: "1. The Nobel prize has become the ultimate ……………… in the sciences.", options: ["eternity", "bladder", "recipient", "accolade"], correct: 3, main: "vocab", sub: "l78" },
        { id: 17, text: "2. Mary is a/an ……………… teacher who never talks down to her students.", options: ["gifted", "aligned", "molecular", "non-invasive"], correct: 0, main: "vocab", sub: "l78" },
        { id: 18, text: "3. Make sure the shelf is ……………… with the top of the cupboard.", options: ["molecular", "aligned", "gifted", "non-invasive"], correct: 1, main: "vocab", sub: "l78" },
        { id: 19, text: "4. The ……………… discovered a new method to treat cancer.", options: ["eternity", "researcher", "genetics", "nomination"], correct: 1, main: "vocab", sub: "l78" }
    ];
    
    const ALL_QUESTIONS = [...GRAMMAR_QS, ...VOCAB_L12, ...VOCAB_L45, ...VOCAB_L78];
    const TOTAL_QS = ALL_QUESTIONS.length;
    
    let studentName = "";
    let userAnswers = new Array(TOTAL_QS).fill(null);
    let currentMain = "grammar";      // 'grammar' or 'vocab'
    let currentSub = null;             // for vocab: 'l12', 'l45', 'l78'; for grammar: null
    
    // DOM elements
    const welcomeScreen = document.getElementById('welcome-screen');
    const quizScreen = document.getElementById('quiz-screen');
    const resultScreen = document.getElementById('result-screen');
    const questionsContainer = document.getElementById('questions-container');
    const globalProgress = document.getElementById('global-progress');
    const totalScoreSpan = document.getElementById('total-score-span');
    const totalQtySpan = document.getElementById('total-questions-count');
    const subTabsContainer = document.getElementById('sub-tabs-container');
    
    // Helper: compute stats per main and per sub
    function computeStats() {
        let grammarDone = 0, grammarCorrect = 0;
        let vocabDone = 0, vocabCorrect = 0;
        let overallCorrect = 0, overallDone = 0;
        let subStats = { l12: { done: 0, correct: 0, total: 4 }, l45: { done: 0, correct: 0, total: 4 }, l78: { done: 0, correct: 0, total: 4 } };
        
        ALL_QUESTIONS.forEach(q => {
            const ans = userAnswers[q.id];
            const isAnswered = ans !== null;
            if (isAnswered) {
                overallDone++;
                const isRight = (ans === q.correct);
                if (isRight) overallCorrect++;
                
                if (q.main === "grammar") {
                    grammarDone++;
                    if (isRight) grammarCorrect++;
                } else {
                    vocabDone++;
                    if (isRight) vocabCorrect++;
                    if (q.sub === "l12") {
                        subStats.l12.done++;
                        if (isRight) subStats.l12.correct++;
                    } else if (q.sub === "l45") {
                        subStats.l45.done++;
                        if (isRight) subStats.l45.correct++;
                    } else if (q.sub === "l78") {
                        subStats.l78.done++;
                        if (isRight) subStats.l78.correct++;
                    }
                }
            }
        });
        return { grammarDone, grammarCorrect, vocabDone, vocabCorrect, overallCorrect, overallDone, subStats };
    }
    
    function updateUIStats() {
        const stats = computeStats();
        document.getElementById('grammar-main-stats').innerHTML = `${stats.grammarDone}/8 ✅ ${stats.grammarCorrect}`;
        document.getElementById('vocab-main-stats').innerHTML = `${stats.vocabDone}/12 ✅ ${stats.vocabCorrect}`;
        totalScoreSpan.innerText = stats.overallCorrect;
        const percent = (stats.overallDone / TOTAL_QS) * 100;
        globalProgress.style.width = percent + "%";
        
        // update sub-tab badges if they exist
        const l12btn = document.getElementById('sub-l12');
        if (l12btn) l12btn.querySelector('.sub-stats').innerHTML = `${stats.subStats.l12.done}/4 ✅ ${stats.subStats.l12.correct}`;
        const l45btn = document.getElementById('sub-l45');
        if (l45btn) l45btn.querySelector('.sub-stats').innerHTML = `${stats.subStats.l45.done}/4 ✅ ${stats.subStats.l45.correct}`;
        const l78btn = document.getElementById('sub-l78');
        if (l78btn) l78btn.querySelector('.sub-stats').innerHTML = `${stats.subStats.l78.done}/4 ✅ ${stats.subStats.l78.correct}`;
        return stats;
    }
    
    // Build sub-tabs for Vocabulary (only when main = vocab)
    function rebuildSubTabs() {
        if (currentMain === 'grammar') {
            subTabsContainer.style.display = 'none';
            currentSub = null;
        } else {
            subTabsContainer.style.display = 'flex';
            subTabsContainer.innerHTML = `
                <button id="sub-l12" class="sub-tab-btn ${currentSub === 'l12' ? 'active' : ''}" onclick="switchSubTab('l12')">
                    📘 Lessons 1&2 <span class="sub-stats">0/4 ✅ 0</span>
                </button>
                <button id="sub-l45" class="sub-tab-btn ${currentSub === 'l45' ? 'active' : ''}" onclick="switchSubTab('l45')">
                    📗 Lessons 4&5 <span class="sub-stats">0/4 ✅ 0</span>
                </button>
                <button id="sub-l78" class="sub-tab-btn ${currentSub === 'l78' ? 'active' : ''}" onclick="switchSubTab('l78')">
                    📙 Lessons 7&8 <span class="sub-stats">0/4 ✅ 0</span>
                </button>
            `;
            // If no current sub set, default to l12
            if (!currentSub) currentSub = 'l12';
            // update active class based on currentSub
            document.querySelectorAll('.sub-tab-btn').forEach(btn => {
                if (btn.id === `sub-${currentSub}`) btn.classList.add('active');
                else btn.classList.remove('active');
            });
        }
        updateUIStats(); // refresh badge numbers
    }
    
    // Get filtered questions for current view
    function getCurrentQuestions() {
        if (currentMain === 'grammar') {
            return ALL_QUESTIONS.filter(q => q.main === 'grammar');
        } else {
            return ALL_QUESTIONS.filter(q => q.main === 'vocab' && q.sub === currentSub);
        }
    }
    
    function renderCurrentTab() {
        if (!questionsContainer) return;
        const filtered = getCurrentQuestions();
        questionsContainer.innerHTML = "";
        
        filtered.forEach((q, idx) => {
            const card = document.createElement('div');
            card.className = 'question-card';
            const qText = document.createElement('div');
            qText.className = 'question-text';
            // Display numbering relative to section (1-based)
            let displayNum = idx + 1;
            qText.innerText = `${displayNum}. ${q.text}`;
            card.appendChild(qText);
            
            const optsDiv = document.createElement('div');
            optsDiv.className = 'options-area';
            q.options.forEach((opt, optIdx) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = `${String.fromCharCode(65+optIdx)}. ${opt}`;
                const isAnswered = userAnswers[q.id] !== null;
                if (isAnswered) {
                    btn.disabled = true;
                    if (optIdx === q.correct) btn.classList.add('correct');
                    if (optIdx === userAnswers[q.id] && optIdx !== q.correct) btn.classList.add('wrong');
                } else {
                    btn.onclick = () => handleAnswer(q.id, optIdx);
                }
                optsDiv.appendChild(btn);
            });
            card.appendChild(optsDiv);
            questionsContainer.appendChild(card);
        });
    }
    
    function handleAnswer(qId, selectedIdx) {
        if (userAnswers[qId] !== null) return;
        const question = ALL_QUESTIONS.find(q => q.id === qId);
        const isCorrect = (selectedIdx === question.correct);
        const sound = document.getElementById(isCorrect ? 'snd-correct' : 'snd-wrong');
        if (sound) sound.play().catch(e=>{});
        userAnswers[qId] = selectedIdx;
        renderCurrentTab();
        const stats = updateUIStats();
        if (stats.overallDone === TOTAL_QS) {
            setTimeout(() => showResultsScreen(), 500);
        }
    }
    
    function switchMainTab(main) {
        currentMain = main;
        if (main === 'grammar') {
            currentSub = null;
        } else {
            if (!currentSub) currentSub = 'l12';
        }
        // Update active class on main tabs
        document.querySelectorAll('.main-tab-btn').forEach(btn => {
            if (btn.getAttribute('data-main') === main) btn.classList.add('active');
            else btn.classList.remove('active');
        });
        rebuildSubTabs();
        renderCurrentTab();
    }
    
    function switchSubTab(sub) {
        currentSub = sub;
        rebuildSubTabs(); // updates active state and badges
        renderCurrentTab();
    }
    
    function initiateQuiz() {
        const nameInput = document.getElementById('student-name');
        const raw = nameInput.value.trim();
        if (raw === "") {
            alert("Please enter your name to begin.");
            return;
        }
        studentName = raw;
        userAnswers = new Array(TOTAL_QS).fill(null);
        currentMain = "grammar";
        currentSub = null;
        document.querySelectorAll('.main-tab-btn').forEach(btn => {
            if (btn.getAttribute('data-main') === 'grammar') btn.classList.add('active');
            else btn.classList.remove('active');
        });
        rebuildSubTabs();
        updateUIStats();
        renderCurrentTab();
        welcomeScreen.style.display = 'none';
        quizScreen.style.display = 'block';
        resultScreen.style.display = 'none';
        if (questionsContainer) questionsContainer.scrollTop = 0;
    }
    
    function showResultsScreen() {
        const stats = computeStats();
        const percent = Math.round((stats.overallCorrect / TOTAL_QS) * 100);
        let rank = "";
        if (stats.overallCorrect === TOTAL_QS) rank = "🏆 PERFECT SCHOLAR 🏆";
        else if (stats.overallCorrect >= 16) rank = "🌟 Excellence Award 🌟";
        else if (stats.overallCorrect >= 12) rank = "📚 Proficient Achiever";
        else rank = "📖 Keep Growing!";
        document.getElementById('rank-slot').innerHTML = rank;
        document.getElementById('final-score').innerHTML = `🎯 Score: ${stats.overallCorrect} / ${TOTAL_QS}  (${percent}%)`;
        quizScreen.style.display = 'none';
        resultScreen.style.display = 'block';
        const win = document.getElementById('snd-win');
        if (win) win.play().catch(e=>{});
        canvasConfetti({ particleCount: 220, spread: 85, origin: { y: 0.6 }, colors: ['#1e4a6e', '#0f3b5c', '#f59e0b'] });
        canvasConfetti({ particleCount: 70, spread: 120, origin: { y: 0.4, x: 0.3 }, startVelocity: 15 });
    }
    
    function resetFullQuiz() {
        studentName = "";
        userAnswers = new Array(TOTAL_QS).fill(null);
        document.getElementById('student-name').value = "";
        welcomeScreen.style.display = 'block';
        quizScreen.style.display = 'none';
        resultScreen.style.display = 'none';
        currentMain = "grammar";
        currentSub = null;
        updateUIStats();
        globalProgress.style.width = "0%";
        document.querySelectorAll('.main-tab-btn').forEach(btn => {
            if (btn.getAttribute('data-main') === 'grammar') btn.classList.add('active');
            else btn.classList.remove('active');
        });
    }
    
    function downloadCertificate() {
        if (!studentName) {
            const fallback = document.getElementById('student-name')?.value.trim();
            if (fallback) studentName = fallback;
            else studentName = "Ambitious Student";
        }
        const stats = computeStats();
        const percent = Math.round((stats.overallCorrect / TOTAL_QS) * 100);
        const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
        const w = 297, h = 210;
        doc.setFillColor(240, 248, 255);
        doc.rect(0, 0, w, h, 'F');
        doc.setDrawColor(31, 78, 110);
        doc.setLineWidth(2);
        doc.rect(10, 10, w - 20, h - 20);
        
        doc.setFont("helvetica", "bold");
        doc.setFontSize(32);
        doc.setTextColor(30, 41, 59);
        doc.text("CERTIFICATE OF ACHIEVEMENT", w/2, 55, { align: "center" });
        
        doc.setFont("helvetica", "normal");
        doc.setFontSize(18);
        doc.setTextColor(71, 85, 105);
        doc.text("This certificate is proudly presented to", w/2, 80, { align: "center" });
        
        doc.setFont("helvetica", "bold");
        doc.setFontSize(34);
        doc.setTextColor(31, 78, 110);
        doc.text(studentName.toUpperCase(), w/2, 110, { align: "center" });
        
        doc.setFont("helvetica", "normal");
        doc.setFontSize(16);
        doc.setTextColor(51, 65, 85);
        doc.text(`for outstanding performance in Grade 12 English (Unit 12)`, w/2, 138, { align: "center" });
        doc.text(`Grammar & Vocabulary Mastery (Lessons 1–8)`, w/2, 152, { align: "center" });
        
        doc.setFontSize(20);
        doc.setFont("helvetica", "bold");
        doc.setTextColor(22, 163, 74);
        doc.text(`Final Score: ${stats.overallCorrect} / ${TOTAL_QS}  ·  ${percent}%`, w/2, 172, { align: "center" });
        
        doc.setFontSize(12);
        doc.setFont("helvetica", "italic");
        doc.setTextColor(100, 116, 139);
        doc.text(`Date: ${new Date().toLocaleDateString()}`, w/2, 190, { align: "center" });
        
        doc.setFont("helvetica", "bold");
        doc.setFontSize(14);
        doc.setTextColor(15, 23, 42);
        doc.text("Mr. Ali Misbah", w/2, 202, { align: "center" });
        doc.setFontSize(10);
        doc.text("English Language Instructor", w/2, 208, { align: "center" });
        
        doc.save(`${studentName.replace(/\s/g, "_")}_Grade12_Certificate.pdf`);
    }
    
    totalQtySpan.innerText = TOTAL_QS;
    window.initiateQuiz = initiateQuiz;
    window.switchMainTab = switchMainTab;
    window.switchSubTab = switchSubTab;
    window.resetFullQuiz = resetFullQuiz;
    window.downloadCertificate = downloadCertificate;
    
    document.addEventListener('DOMContentLoaded', () => {
        updateUIStats();
    });
</script>
</body>
</html>
