<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grade 6 English Quiz - Mr. Ali Misbah</title>
  
  <!-- Import a beautiful, modern, rounded font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  
  <!-- Import a Confetti animation library -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    /* Fun, modern app styling */
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
      color: #333;
      margin: 0;
      padding: 20px;
      padding-bottom: 120px; 
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    /* HEADER WITH LOGOS */
    .header {
      background: white;
      padding: 20px 30px;
      border-radius: 16px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.05);
      margin-bottom: 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      border-top: 8px solid #3b82f6;
    }
    .logos-container {
      display: flex;
      justify-content: space-between;
      width: 100%;
      margin-bottom: 15px;
    }
    /* Logo sizing */
    .logo {
      height: 70px;
      object-fit: contain;
    }
    .header-text { text-align: center; }
    .header h1 { margin: 0; color: #1e293b; font-size: 2rem; font-weight: 700;}
    .header p { margin: 5px 0 0 0; font-size: 1.1rem; color: #3b82f6; font-weight: 600; }

    /* PROGRESS BAR */
    .progress-container {
      width: 100%;
      background: #e2e8f0;
      border-radius: 20px;
      height: 12px;
      margin-top: 20px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: #10b981;
      width: 0%; /* Starts at 0 */
      transition: width 0.5s ease;
    }

    /* QUESTION CARDS WITH HOVER ANIMATIONS */
    .question-card {
      background: white;
      padding: 25px;
      border-radius: 16px;
      margin-bottom: 25px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .question-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 20px rgba(0,0,0,0.1);
    }
    .question-title {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 15px;
      color: #1e293b;
    }

    /* ANSWER BUTTONS WITH PRESS ANIMATIONS */
    .options-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }
    .option-btn {
      padding: 16px;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      background: #f8fafc;
      font-size: 1rem;
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      color: #475569;
      cursor: pointer;
      text-align: left;
      transition: all 0.2s ease;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .option-btn:hover:not(:disabled) {
      background: #e2e8f0;
      border-color: #cbd5e1;
    }
    .option-btn:active:not(:disabled) {
      transform: scale(0.98); /* Satisfying click press effect */
    }
    
    .option-btn:disabled { cursor: not-allowed; }
    
    .correct {
      background: #d1fae5 !important;
      border-color: #10b981 !important;
      color: #065f46 !important;
    }
    .wrong {
      background: #fee2e2 !important;
      border-color: #ef4444 !important;
      color: #991b1b !important;
    }

    /* SCORE BOARD */
    .score-board {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e293b;
      color: white;
      padding: 15px 40px;
      border-radius: 50px;
      font-size: 1.3rem;
      font-weight: 700;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      z-index: 1000;
      transition: background 0.5s ease;
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- Header with 2 Logos -->
    <div class="header">
      <div class="logos-container">
        <!-- LOGO 1 (Left) -->
        <img src="neu-logo.png" alt="Neu Academy Logo" class="logo">
        <!-- LOGO 2 (Right) -->
        <img src="lights-logo.png" alt="Lights Logo" class="logo" id="logo2">
      </div>
      
      <div class="header-text">
        <h1>Grade 6 English Quiz</h1>
        <p>👨‍🏫 Teacher: Mr. Ali Misbah</p>
      </div>

      <!-- Progress Bar -->
      <div class="progress-container">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
    </div>

    <!-- Questions go here -->
    <div id="quiz-container"></div>
  </div>

  <!-- Sticky Score -->
  <div class="score-board" id="score-board">
    Score: 0 / 0
  </div>

  <script>
    // ==========================================
    // GRADE 6 QUESTIONS
    // ==========================================
    const quizData =[
      {
        question: "1. Which word in the following sentence is an adjective? 'The heavy rain caused flooding in the city.'",
        options: ["flooding", "heavy", "caused", "city"],
        correctIndex: 1
      },
      {
        question: "2. Choose the correct spelling:",
        options:["Accomodation", "Acommodation", "Accommodation", "Acomodation"],
        correctIndex: 2
      },
      {
        question: "3. What is the past tense of the verb 'to catch'?",
        options: ["Catched", "Caught", "Catching", "Cought"],
        correctIndex: 1
      },
      {
        question: "4. Identify the synonym for the word 'Enormous':",
        options:["Tiny", "Average", "Huge", "Weak"],
        correctIndex: 2
      },
      {
        question: "5. 'She was reading a book ___ her brother was playing outside.' Which conjunction fits best?",
        options:["but", "or", "while", "because"],
        correctIndex: 2
      }
    ];

    const quizContainer = document.getElementById('quiz-container');
    const scoreBoard = document.getElementById('score-board');
    const progressBar = document.getElementById('progress-bar');
    
    let score = 0;
    let answeredQuestions = 0;

    // Generate Quiz
    quizData.forEach((item, questionIndex) => {
      const card = document.createElement('div');
      card.className = 'question-card';

      const questionTitle = document.createElement('div');
      questionTitle.className = 'question-title';
      questionTitle.innerText = item.question;
      card.appendChild(questionTitle);

      const optionsGrid = document.createElement('div');
      optionsGrid.className = 'options-grid';

      item.options.forEach((optionText, optionIndex) => {
        const button = document.createElement('button');
        button.className = 'option-btn';
        
        // Use span so we can inject an emoji icon on the right side
        button.innerHTML = `<span>${optionText}</span> <span class="icon"></span>`;
        
        button.onclick = () => handleAnswerClick(button, optionIndex, item.correctIndex, optionsGrid);
        optionsGrid.appendChild(button);
      });

      card.appendChild(optionsGrid);
      quizContainer.appendChild(card);
    });

    updateScoreDisplay();

    function handleAnswerClick(clickedButton, selectedIndex, correctIndex, optionsGrid) {
      const allButtons = optionsGrid.querySelectorAll('.option-btn');
      
      allButtons.forEach((btn, idx) => {
        btn.disabled = true;
        const iconSpan = btn.querySelector('.icon');
        
        // Highlight correct answer automatically
        if (idx === correctIndex) {
          btn.classList.add('correct');
          iconSpan.innerText = "✅"; 
        }
      });

      if (selectedIndex === correctIndex) {
        score++;
      } else {
        clickedButton.classList.add('wrong');
        clickedButton.querySelector('.icon').innerText = "❌";
      }

      answeredQuestions++;
      updateProgress();
      updateScoreDisplay();
    }

    function updateProgress() {
      // Calculate percentage for progress bar
      const percentage = (answeredQuestions / quizData.length) * 100;
      progressBar.style.width = percentage + "%";
    }

    function updateScoreDisplay() {
      scoreBoard.innerText = `Score: ${score} / ${quizData.length}`;
      
      // When all questions are answered!
      if (answeredQuestions === quizData.length) {
        scoreBoard.innerHTML = `Final Score: ${score} / ${quizData.length} 🌟`;
        scoreBoard.style.background = "#10b981"; // Turn score green
        
        // SHOOT CONFETTI!
        shootConfetti();
      }
    }

    function shootConfetti() {
      var duration = 3 * 1000;
      var animationEnd = Date.now() + duration;
      var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 10000 };

      function randomInRange(min, max) { return Math.random() * (max - min) + min; }

      var interval = setInterval(function() {
        var timeLeft = animationEnd - Date.now();
        if (timeLeft <= 0) { return clearInterval(interval); }
        var particleCount = 50 * (timeLeft / duration);
        confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
        confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
      }, 250);
    }
  </script>
</body>
</html>
