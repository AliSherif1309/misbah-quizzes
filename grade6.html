<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grade 6 English Quiz - Mr. Ali Misbah</title>
  <style>
    /* Clean, modern classroom design */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f0f4f8; /* Soft blue-grey background */
      color: #333;
      margin: 0;
      padding: 20px;
      padding-bottom: 100px; /* Space for the floating score */
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    /* Header styling */
    .header {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
      text-align: center;
      margin-bottom: 30px;
      border-top: 8px solid #3b82f6; /* Blue accent line */
    }
    .header h1 {
      margin: 0;
      color: #1e293b;
      font-size: 2.2rem;
    }
    .header p {
      margin: 10px 0 0 0;
      font-size: 1.2rem;
      color: #64748b;
      font-weight: bold;
    }

    /* Question Cards */
    .question-card {
      background: white;
      padding: 25px;
      border-radius: 12px;
      margin-bottom: 20px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    }
    .question-title {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 15px;
      color: #1e293b;
    }

    /* Answer Buttons */
    .options-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }
    .option-btn {
      padding: 15px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      background: #f8fafc;
      font-size: 1rem;
      color: #334155;
      cursor: pointer;
      text-align: left;
      transition: all 0.2s ease;
    }
    .option-btn:hover:not(:disabled) {
      background: #e2e8f0;
    }
    
    /* Interactive Colors */
    .option-btn:disabled {
      cursor: not-allowed;
    }
    .correct {
      background: #d1fae5 !important;
      border-color: #10b981 !important;
      color: #065f46 !important;
      font-weight: bold;
    }
    .wrong {
      background: #fee2e2 !important;
      border-color: #ef4444 !important;
      color: #991b1b !important;
    }

    /* Sticky Score Board */
    .score-board {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e293b;
      color: white;
      padding: 15px 40px;
      border-radius: 50px;
      font-size: 1.3rem;
      font-weight: bold;
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
      z-index: 1000;
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- Quiz Header -->
    <div class="header">
      <h1>Grade 6 English Quiz</h1>
      <p>Teacher: Mr. Ali Misbah</p>
    </div>

    <!-- Questions will be inserted here by JavaScript -->
    <div id="quiz-container"></div>
  </div>

  <!-- Floating Score Tracker -->
  <div class="score-board" id="score-board">
    Score: 0 / 0
  </div>

  <script>
    // ==========================================
    // PUT YOUR QUESTIONS AND ANSWERS HERE!
    // correctIndex is the number of the correct answer (0 is the first option, 1 is the second, etc.)
    // ==========================================
    const quizData =[
      {
        question: "1. Which word in the following sentence is an adjective? 'The heavy rain caused flooding in the city.'",
        options: ["flooding", "heavy", "caused", "city"],
        correctIndex: 1 // "heavy" is the 2nd option, so index is 1
      },
      {
        question: "2. Choose the correct spelling:",
        options:["Accomodation", "Acommodation", "Accommodation", "Acomodation"],
        correctIndex: 2 // "Accommodation" is the 3rd option, so index is 2
      },
      {
        question: "3. What is the past tense of the verb 'to catch'?",
        options: ["Catched", "Caught", "Catching", "Cought"],
        correctIndex: 1
      },
      {
        question: "4. Identify the synonym for the word 'Enormous':",
        options:["Tiny", "Average", "Huge", "Weak"],
        correctIndex: 2
      },
      {
        question: "5. 'She was reading a book ___ her brother was playing outside.' Which conjunction fits best?",
        options: ["but", "or", "while", "because"],
        correctIndex: 2
      }
    ];
    // ==========================================

    const quizContainer = document.getElementById('quiz-container');
    const scoreBoard = document.getElementById('score-board');
    
    let score = 0;
    let answeredQuestions = 0;

    // Build the quiz on the page
    quizData.forEach((item, questionIndex) => {
      // Create the white card for the question
      const card = document.createElement('div');
      card.className = 'question-card';

      // Add the question text
      const questionTitle = document.createElement('div');
      questionTitle.className = 'question-title';
      questionTitle.innerText = item.question;
      card.appendChild(questionTitle);

      // Create a grid for the options
      const optionsGrid = document.createElement('div');
      optionsGrid.className = 'options-grid';

      // Create buttons for each option
      item.options.forEach((optionText, optionIndex) => {
        const button = document.createElement('button');
        button.className = 'option-btn';
        button.innerText = optionText;
        
        // What happens when a student clicks an answer
        button.onclick = () => handleAnswerClick(button, optionIndex, item.correctIndex, optionsGrid);
        
        optionsGrid.appendChild(button);
      });

      card.appendChild(optionsGrid);
      quizContainer.appendChild(card);
    });

    // Update the starting score text
    updateScoreDisplay();

    function handleAnswerClick(clickedButton, selectedIndex, correctIndex, optionsGrid) {
      const allButtons = optionsGrid.querySelectorAll('.option-btn');
      
      // 1. Disable all buttons for this specific question so they can't change their answer
      allButtons.forEach((btn, idx) => {
        btn.disabled = true;
        
        // Highlight the correct answer in green no matter what they clicked
        if (idx === correctIndex) {
          btn.classList.add('correct');
        }
      });

      // 2. Check if the student's click was right or wrong
      if (selectedIndex === correctIndex) {
        score++; // Add a point!
      } else {
        clickedButton.classList.add('wrong'); // Turn their wrong choice red
      }

      // 3. Update the scoreboard
      answeredQuestions++;
      updateScoreDisplay();
    }

    function updateScoreDisplay() {
      scoreBoard.innerText = `Score: ${score} / ${quizData.length}`;
      
      // Optional: Add a message when they finish all questions
      if (answeredQuestions === quizData.length) {
        scoreBoard.innerText = `Final Score: ${score} / ${quizData.length} 🎉`;
        scoreBoard.style.background = "#10b981"; // Turn the score box green when finished
      }
    }
  </script>
</body>
</html>
